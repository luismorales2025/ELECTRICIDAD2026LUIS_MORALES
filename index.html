<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF PRO</title>

<style>
body{
    margin:0;
    background:black;
    overflow:auto;
}

/* contenedor */
.viewer{
    position:relative;
    width:100%;
    height:100vh;
}

/* PDF */
iframe{
    width:100%;
    height:100%;
    border:none;
}

/* capa inteligente */
.blocker{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:5;
}
</style>
</head>

<body>

<div class="viewer">

    <iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0"></iframe>

    <!-- capa encima -->
    <div class="blocker" id="blocker"></div>

</div>

<script>
// bloquear clic derecho en TODA la capa
document.getElementById("blocker").addEventListener("contextmenu", e=>{
    e.preventDefault();
});

// permitir scroll pero bloquear clics
document.getElementById("blocker").addEventListener("mousedown", e=>{
    e.preventDefault();
});

// bloquear teclado
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p'||e.key==='u')){
        e.preventDefault();
    }
});

// bloquear impresión
window.onbeforeprint = function(){
    alert("Acción no permitida");
    return false;
};
</script>

</body>
</html>
