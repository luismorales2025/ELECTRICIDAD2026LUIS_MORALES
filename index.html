<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF</title>

<!-- 🔥 ANTI CACHE -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<!-- 🔥 GOOGLE ANALYTICS (PON TU ID REAL) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TF2FTNT5JW"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

// 👇 esto ayuda a que no cachee eventos
gtag('config', 'G-TF2FTNT5JW', {
  'send_page_view': true,
  'transport_type': 'beacon'
});
</script>

<style>
body{
    margin:0;
    background:#000;
}

/* PDF pantalla completa */
iframe{
    width:100%;
    height:100vh;
    border:none;
}
</style>
</head>

<body>

<iframe id="pdf"></iframe>

<script>
// 🔥 CARGAR PDF SIN CACHE
document.getElementById("pdf").src =
"manual-electricidad.pdf?nocache=" + new Date().getTime();

// 🚫 BLOQUEOS BÁSICOS
document.addEventListener("contextmenu", e=>e.preventDefault());

document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p')){
        e.preventDefault();
    }
});

window.onbeforeprint = function(){
    return false;
};
</script>

</body>
</html>
