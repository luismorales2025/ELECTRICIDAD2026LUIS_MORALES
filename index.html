<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF Seguro</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

/* CONTENEDOR */
#pdfContainer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

/* IFRAME */
iframe{
    width:100%;
    height:100%;
    border:none;
}

/* BLOQUEO VISUAL */
.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:10;
}
</style>
</head>

<body>

<div id="pdfContainer">
    <!-- PDF sin toolbar -->
    <iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>

    <!-- capa invisible encima para bloquear clics -->
    <div class="overlay"></div>
</div>

<script>
// Bloquear clic derecho
document.addEventListener("contextmenu", e=>e.preventDefault());

// Bloquear teclas comunes
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p'||e.key==='u')){
        e.preventDefault();
    }
});

// Intento bloquear impresión
window.onbeforeprint = function(){
    alert("Acción no permitida");
    return false;
};
</script>

</body>
</html>
