<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Electricidad PRO App</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

/* BOTONES */
.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    padding:20px;
}

.btn{
    padding:15px 20px;
    border-radius:12px;
    background:#00ffcc;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

/* CONTENEDORES */
.section{
    display:none;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:15px;
    margin:10px;
    border-radius:15px;
}

/* PDF */
#pdfContainer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    flex-direction:column;
    z-index:999;
}

.toolbar{
    background:#111;
    padding:10px;
}

iframe{
    width:100%;
    height:100%;
}

/* input */
input{
    padding:10px;
    border-radius:10px;
    border:none;
}

/* sopa */
.grid{
    display:grid;
    grid-template-columns: repeat(6,40px);
    justify-content:center;
    gap:5px;
}

.cell{
    width:40px;
    height:40px;
    background:white;
    color:black;
    display:flex;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<h1>⚡ Electricidad PRO</h1>

<div class="menu">
<div class="btn" onclick="abrir(1)">Fundamentos</div>
<div class="btn" onclick="abrir(2)">Leyes</div>
<div class="btn" onclick="abrir(3)">Circuitos</div>
<div class="btn" onclick="abrir(4)">Domiciliario</div>
<div class="btn" onclick="abrir(5)">Solar</div>
<div class="btn" onclick="abrir(6)">Final</div>
</div>

<!-- SECCIONES -->

<div id="sec1" class="section">
<div class="card">
<h2>¿Qué es la electricidad?</h2>
<input id="q1" placeholder="Respuesta">
</div>
<button onclick="verificar(1)">Verificar</button>
</div>

<div id="sec2" class="section">
<div class="card">
<h2>Ley de Ohm V = ?</h2>
<input id="q2">
</div>
<button onclick="verificar(2)">Verificar</button>
</div>

<div id="sec3" class="section">
<div class="card">
<h2>Corriente se mide en?</h2>
<input id="q3">
</div>
<button onclick="verificar(3)">Verificar</button>
</div>

<div id="sec4" class="section">
<div class="card">
<h2>Voltaje se mide en?</h2>
<input id="q4">
</div>
<button onclick="verificar(4)">Verificar</button>
</div>

<div id="sec5" class="section">
<div class="card">
<h2>Panel solar convierte energía?</h2>
<input id="q5">
</div>
<button onclick="verificar(5)">Verificar</button>
</div>

<div id="sec6" class="section">
<h2>Sopa de letras</h2>
<div class="grid" id="sopa"></div>
<button onclick="final()">Finalizar</button>
</div>

<!-- PDF -->
<div id="pdfContainer">
<div class="toolbar">
<button onclick="cerrarPDF()">Cerrar</button>
<button onclick="fullscreen()">Pantalla completa</button>
</div>
<iframe src="manual-electricidad.pdf#toolbar=0"></iframe>
</div>

<button onclick="abrirPDF()">📖 Ver PDF</button>

<script>

/* ABRIR SECCIONES */
function abrir(n){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById("sec"+n).style.display="block";
}

/* RESPUESTAS */
let respuestas = {
1:"energia",
2:"i*r",
3:"amperios",
4:"voltios",
5:"solar"
};

/* VERIFICAR */
function verificar(n){
    let val = document.getElementById("q"+n).value.toLowerCase();
    if(val.includes(respuestas[n])){
        alert("Correcto");
        localStorage.setItem("sec"+n,"ok");
    }else{
        alert("Incorrecto");
    }
}

/* FINAL */
function final(){
    let ok=0;
    for(let i=1;i<=5;i++){
        if(localStorage.getItem("sec"+i)=="ok") ok++;
    }

    if(ok==5){
        alert("🔥 Todo correcto");
    }else{
        alert("Te faltan respuestas");
    }
}

/* SOPA SIMPLE */
let letras="ELECTR";
let sopa=document.getElementById("sopa");
for(let i=0;i<36;i++){
    let d=document.createElement("div");
    d.className="cell";
    d.innerText=letras[Math.floor(Math.random()*letras.length)];
    sopa.appendChild(d);
}

/* PDF */
function abrirPDF(){
    document.getElementById("pdfContainer").style.display="flex";
}
function cerrarPDF(){
    document.getElementById("pdfContainer").style.display="none";
}
function fullscreen(){
    document.getElementById("pdfContainer").requestFullscreen();
}

/* BLOQUEOS */
document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("keydown", function(e){
if(e.ctrlKey && (e.key==='s'||e.key==='p'||e.key==='u')){
e.preventDefault();
}
});

</script>

</body>
</html>
