<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF PRO</title>

<style>
body{
    margin:0;
    background:black;
}

/* CONTENEDOR SCROLL */
.viewer{
    width:100%;
    height:100vh;
    overflow:auto;
}

/* PDF */
iframe{
    width:100%;
    height:3000px; /* AJUSTA SEGÚN TU PDF */
    border:none;

    pointer-events: none; /* 🔥 CLAVE: desactiva clic */
}
</style>
</head>

<body>

<div class="viewer">
    <iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0"></iframe>
</div>

<script>
// bloqueos normales
document.addEventListener("contextmenu", e=>e.preventDefault());

document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p'||e.key==='u')){
        e.preventDefault();
    }
});

window.onbeforeprint = function(){
    alert("Acción no permitida");
    return false;
};
</script>

</body>
</html>
