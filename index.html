<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF PRO</title>

<style>
body{
    margin:0;
    background:black;
}

/* PDF ocupa todo */
iframe{
    width:100%;
    height:100vh;
    border:none;
    display:block;
}
</style>
</head>

<body>

<!-- PDF -->
<iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0"></iframe>

<script>
// 🚫 bloquear clic derecho
document.addEventListener("contextmenu", e=>e.preventDefault());

// 🚫 bloquear teclas
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p'||e.key==='u')){
        e.preventDefault();
    }
});

// 🚫 bloquear impresión
window.onbeforeprint = function(){
    alert("Acción no permitida");
    return false;
};
</script>

</body>
</html>
