<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF PRO</title>

<style>
body{
    margin:0;
    background:#000;
    font-family: Arial, sans-serif;
}

/* CONTENEDOR */
.viewer{
    width:100%;
    height:100vh;
}

/* PDF */
iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="viewer">
    <!-- PDF SIN BARRA -->
    <iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0&scrollbar=1"></iframe>
</div>

<script>
// 🔒 BLOQUEAR CLIC DERECHO
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

// 🔒 BLOQUEAR TECLAS (guardar, imprimir, inspeccionar)
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key === 's' || e.key === 'p' || e.key === 'u')){
        e.preventDefault();
    }
});

// 🔒 BLOQUEAR INTENTO DE IMPRESIÓN
window.onbeforeprint = function(){
    alert("Acción no permitida");
    return false;
};
</script>

</body>
</html>
