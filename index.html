<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF PRO</title>

<style>
body{
    margin:0;
    background:#000;
}

/* PDF ocupa toda la pantalla */
iframe{
    width:100%;
    height:100vh;
    border:none;
    display:block;
}
</style>
</head>

<body>

<iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0"></iframe>

<script>
// 🚫 BLOQUEAR CLIC DERECHO
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

// 🚫 BLOQUEAR TECLAS
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (
        e.key === 's' ||  // guardar
        e.key === 'p' ||  // imprimir
        e.key === 'u'     // ver código
    )){
        e.preventDefault();
    }
});

// 🚫 BLOQUEAR INTENTO DE IMPRESIÓN
window.onbeforeprint = function(){
    alert("Acción no permitida");
    return false;
};
</script>

</body>
</html>
