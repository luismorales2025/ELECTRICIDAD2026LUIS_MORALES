<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF</title>

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TF2FTNT5JW"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-TF2FTNT5JW');
</script>

<style>
body{
    margin:0;
    background:#000;
}

/* PDF pantalla completa */
iframe{
    width:100%;
    height:100vh;
    border:none;
}
</style>
</head>

<body>

<iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0"></iframe>

<script>
// bloquear clic derecho
document.addEventListener("contextmenu", e=>e.preventDefault());

// bloquear Ctrl+S y Ctrl+P
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p')){
        e.preventDefault();
    }
});
</script>

</body>
</html>
