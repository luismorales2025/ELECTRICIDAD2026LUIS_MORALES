<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF</title>

<style>
body{
    margin:0;
    background:#000;
}

/* contenedor */
.viewer{
    width:100%;
    height:100vh;
}

/* pdf */
iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>

<body>

<div class="viewer">
    <iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0&scrollbar=1"></iframe>
</div>

<script>
// bloquear clic derecho
document.addEventListener("contextmenu", e=>e.preventDefault());

// bloquear guardar / imprimir
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key==='s'||e.key==='p')){
        e.preventDefault();
    }
});
</script>

</body>
</html>
