<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visor PDF</title>

<style>
body{
    margin:0;
    background:#000;
}

/* PDF normal */
iframe{
    width:100%;
    height:100vh;
    border:none;
}
</style>
</head>

<body>

<iframe src="manual-electricidad.pdf#toolbar=0&navpanes=0"></iframe>

<script>
// 🚫 SOLO OCULTAR CLICK DERECHO (fuera del visor puede funcionar)
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});

// 🚫 SOLO BLOQUEAR CTRL + S y CTRL + P
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && (e.key === 's' || e.key === 'p')){
        e.preventDefault();
    }
});

// 🚫 OCULTAR INTENTO DE IMPRESIÓN
window.onbeforeprint = function(){
    return false;
};
</script>

</body>
</html>
